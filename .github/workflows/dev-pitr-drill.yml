name: dev PITR drill

# Phase 4 段階 2 GO-3: dev で Firestore PITR 復旧演習を実走
# 隔離 collection `pitr-drill/test-doc-1` のみ操作、本番データには触れない
# workflow_dispatch only (誤起動防止)
# 参考: docs/runbook/prod-pitr.md §復旧演習、docs/adr/0003-public-launch-operations.md §Decision 1
#
# 既知の制約 (2026-06-20 セッションでの実証結果):
#   gcloud firestore databases clone は LRO で、destination database が READY 状態
#   になるまでに分〜時間オーダーで時間がかかる (公式: minutes〜hours)。
#   GitHub Actions の標準 timeout 内で完走しないことがある。
#   現状の運用方針: Phase 4 段階 3 で手動 Console 演習を 1 回実施 (本 workflow は
#   将来の自動化試行用に残す、timeout は 90 分に延長して将来再試行可能性を維持)。
#   詳細は docs/runbook/prod-pitr.md §復旧演習の方針

on:
  workflow_dispatch:

env:
  PROJECT_ID: novel-writer-dev
  PROJECT_NUMBER: '446321146441'

permissions:
  contents: read
  id-token: write

jobs:
  drill:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/446321146441/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@novel-writer-dev.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - name: Pre-check PITR state
        run: |
          gcloud firestore databases describe \
            --database='(default)' \
            --project="$PROJECT_ID" \
            --format='value(pointInTimeRecoveryEnablement,earliestVersionTime,versionRetentionPeriod)'

      - name: Enable PITR (idempotent — no-op if already enabled)
        run: |
          gcloud firestore databases update \
            --database='(default)' \
            --project="$PROJECT_ID" \
            --enable-pitr

      - name: Create test doc
        env:
          GCLOUD_PROJECT: ${{ env.PROJECT_ID }}
        run: npx tsx scripts/pitr-drill.ts create

      - name: Wait 90s + record SNAPSHOT_TIME (whole minute)
        id: snapshot
        run: |
          # 90 秒待機: snapshot 時刻が確実に「create 完了後」になるよう余裕を持たせる
          sleep 90
          # gcloud firestore databases clone の制約:
          #   snapshot-time は whole minute (秒 :00) かつ in the past である必要あり
          # GNU date (ubuntu-latest): 1 分前を秒 00 で記録
          SNAPSHOT_TIME=$(date -u -d '-1 minute' +%Y-%m-%dT%H:%M:00Z)
          echo "snapshot_time=$SNAPSHOT_TIME" >> "$GITHUB_OUTPUT"
          echo "Recorded SNAPSHOT_TIME: $SNAPSHOT_TIME"

      - name: Delete test doc (destroy)
        env:
          GCLOUD_PROJECT: ${{ env.PROJECT_ID }}
        run: npx tsx scripts/pitr-drill.ts delete

      - name: PITR clone to new database
        # PITR snapshot からの復旧は `gcloud firestore databases clone` を使う
        # `gcloud firestore databases restore` は Backup 専用、PITR 用ではない
        id: clone
        run: |
          DEST_DB="drill-restore-$(date +%s)"
          echo "dest_db=$DEST_DB" >> "$GITHUB_OUTPUT"
          gcloud firestore databases clone \
            --source-database="projects/$PROJECT_ID/databases/(default)" \
            --destination-database="$DEST_DB" \
            --snapshot-time="${{ steps.snapshot.outputs.snapshot_time }}" \
            --project="$PROJECT_ID"
          echo "Cloned to: $DEST_DB"

      - name: Wait for cloned database to be READY (clone is LRO)
        # gcloud firestore databases clone は LRO (Long-Running Operation)。
        # コマンド return 後も database が restoring 状態のため、
        # FAILED_PRECONDITION (code 9) が返らなくなるまで poll する。
        # timeout は workflow 全体 (90 分) - 他 step 余裕分を script 側で吸収。
        env:
          GCLOUD_PROJECT: ${{ env.PROJECT_ID }}
          PITR_WAIT_MAX_ATTEMPTS: '480'
          PITR_WAIT_INTERVAL_MS: '10000'
        run: npx tsx scripts/pitr-drill.ts wait-ready "${{ steps.clone.outputs.dest_db }}"

      - name: Verify cloned doc (must EXIST in cloned db)
        env:
          GCLOUD_PROJECT: ${{ env.PROJECT_ID }}
        run: npx tsx scripts/pitr-drill.ts verify "${{ steps.clone.outputs.dest_db }}"

      - name: Cleanup cloned database
        if: always()
        run: |
          DEST_DB="${{ steps.clone.outputs.dest_db }}"
          if [ -n "$DEST_DB" ]; then
            # gcloud firestore databases delete は --database=<NAME> flag 必須
            # (positional arg ではない)
            gcloud firestore databases delete \
              --database="$DEST_DB" \
              --project="$PROJECT_ID" \
              --quiet
            echo "Cleaned up: $DEST_DB"
          fi

      - name: Post-check PITR state
        run: |
          gcloud firestore databases describe \
            --database='(default)' \
            --project="$PROJECT_ID" \
            --format='value(pointInTimeRecoveryEnablement,earliestVersionTime,versionRetentionPeriod)'

      - name: Cleanup any leftover test docs in (default)
        if: always()
        env:
          GCLOUD_PROJECT: ${{ env.PROJECT_ID }}
        run: |
          # 演習で create したが delete されずに残った doc を念のため削除 (best-effort)
          npx tsx scripts/pitr-drill.ts delete 2>/dev/null || true
