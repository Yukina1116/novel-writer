name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: novel-writer-dev
  REGION: asia-northeast1
  SERVICE: novel-writer
  REPOSITORY: novel-writer

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/446321146441/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@novel-writer-dev.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE}:${IMAGE_TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
          flags: >-
            --service-account=novel-writer-run@novel-writer-dev.iam.gserviceaccount.com
            --memory=512Mi
            --timeout=300
            --max-instances=2
            --set-env-vars=GCP_PROJECT=novel-writer-dev,GCP_LOCATION=asia-northeast1,USE_VERTEX_AI=true

      - name: Output URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
